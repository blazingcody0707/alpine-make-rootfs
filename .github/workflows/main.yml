name: CI

on:
  - pull_request
  - push

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        branch:
          - latest-stable
          - edge
          - v3.24

    steps:
      - uses: actions/checkout@v6

      - name: Download and Extract Mesa for Android Container
        run: |
          wget -q https://github.com/lfdevs/mesa-for-android-container/releases/download/mesa-26.2.0-devel-20260621/mesa-for-android-container_26.2.0-devel-20260621_alpine_3.24_arm64.tar.gz
          sudo tar -xzf mesa-for-android-container_26.2.0-devel-20260621_alpine_3.24_arm64.tar.gz -C /

      - name: Build rootfs tarball using script from file
        run: |
          sudo ./alpine-make-rootfs \
            --branch ${{ matrix.branch }} \
            --packages 'ruby sqlite' \
            --script-chroot \
            example-$(date +%Y%m%d).tar.gz -- ./example/install.sh

      - name: Build rootfs using script from stdin
        run: |
          cd example
          sudo ../alpine-make-rootfs \
            --branch ${{ matrix.branch }} \
            --packages 'ruby sqlite' \
            --script-chroot \
            rootfs - < install.sh
